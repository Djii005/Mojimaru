name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Build Python Sidecar
        run: |
          uv venv core/.venv
          uv pip install --python core/.venv/Scripts/python.exe -e "core[ml]"
          uv pip install --python core/.venv/Scripts/python.exe pyinstaller
          core/.venv/Scripts/pyinstaller --onefile --clean --name mojimaru --collect-all mojimaru --collect-data manga_ocr --collect-data paddleocr --collect-data ultralytics core/src/mojimaru/__main__.py

      - name: Copy Sidecar to Tauri
        run: |
          New-Item -ItemType Directory -Force -Path app/src-tauri/binaries
          Copy-Item dist/mojimaru.exe -Destination app/src-tauri/binaries/mojimaru-x86_64-pc-windows-msvc.exe


      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: app
        run: pnpm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mojimaru ${{ github.ref_name }}'
          releaseBody: 'Automatic release generated by GitHub Actions.'
          releaseDraft: true
          prerelease: false
          projectPath: ./app
