name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"

jobs:
  python:
    name: Python core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev,inpaint]"
      - name: Lint
        run: .venv/bin/python -m ruff check .
      - name: Test
        run: .venv/bin/python -m pytest -m "not ml"

  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run build

  rust:
    name: Rust (cargo check + test)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Build frontend (tauri build script reads dist/)
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - name: cargo check
        working-directory: app/src-tauri
        run: cargo check
      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --no-default-features
